<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
    <title>إضافة محتوى</title>
    <link rel="stylesheet" href="css/fa/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!--
220 desc - 40 title => notifications
100 desc - 35 title => studio
-->
<div class="card">
    <h3>محتوى الإستديو و الإشعارات</h3>
    <form id="upload-form">
        <div class="form-group">
            <label for="target-table">أرسل إلى:</label>
            <select id="target-table">
                <option value="studio" selected>إستديو الوفاء</option>
                <option value="notifications">الأحداث و الإشعارات</option>
            </select>
        </div>
        <div class="form-group">
            <label for="title">أكتب العنوان:</label>
            <input type="text" id="title" placeholder="العنوان..." required>
        </div>
        <div class="form-group">
            <label for="desc">الوصف:</label>
            <textarea id="desc" placeholder="الوصف..." required></textarea>
        </div>
        <div class="form-group">
            <label for="file-input" class="file-label" id="file-label-text"> إختار صورة من جهازك
            <input type="file" id="file-input" accept="image/*" required>
        </div>
        <div class="progress-bar" id="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <button type="submit" class="btn" id="submit-btn">نشر</button>
    </form>
    <div id="status"></div>
</div>
<a href="index.htm" class="back">
        <i class="fa fa-arrow-right"></i>
    </a>
<script defer src="js/script.js"></script>
</body>
</html>
